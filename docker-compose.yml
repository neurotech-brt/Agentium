services:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # PostgreSQL Database
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  postgres:
    image: postgres:15-alpine
    container_name: agentium-postgres
    environment:
      POSTGRES_DB: agentium
      POSTGRES_USER: agentium
      POSTGRES_PASSWORD: agentium
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentium"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - agentium-network

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # ChromaDB Vector Store
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: agentium-chroma
    volumes:
      - chroma_data:/data
    ports:
      - "8001:8000"
    networks:
      - agentium-network
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Redis (Celery Task Queue)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  redis:
    image: redis:7.2.1-alpine
    container_name: agentium-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agentium-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # MinIO Object Storage
  # Primary store for file uploads.
  # If this service is unreachable the
  # backend falls back to local disk at
  # STORAGE_LOCAL_PATH automatically.
  # Console → http://localhost:9001
  #   login: minioadmin / minioadmin
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  minio:
    image: minio/minio:latest
    container_name: agentium-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - agentium-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # WhatsApp Web Bridge (Baileys)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  whatsapp-bridge:
    build:
      context: ./bridges/whatsapp
      dockerfile: Dockerfile
    image: ghcr.io/ashmindhungana/agentium/whatsapp-bridge:main
    container_name: agentium-whatsapp-bridge
    environment:
      - PORT=3001
      - BRIDGE_TOKEN=${WHATSAPP_BRIDGE_TOKEN:-changeme}
      - AUTH_DIR=/app/auth_info
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      - "3001:3001"
    volumes:
      - whatsapp_auth:/app/auth_info
    restart: unless-stopped
    networks:
      - agentium-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Voice Bridge Auto-Installer
  # Runs automatically on every `docker compose up`.
  # Waits for the backend to be healthy first, then
  # installs the voice bridge on the host machine.
  # Safe to re-run — skips install if already done.
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  voice-autoinstall:
    # ─────────────────────────────────────────────────────────────────────────
    # Fully automatic voice bridge installer — runs once, safe to re-run.
    #
    # Linux / macOS / WSL2:
    #   Runs detect-host.sh + install-voice-bridge.sh inside the container.
    #   Those scripts create the venv + register the OS service via the
    #   mounted ~/.agentium volume. Zero manual steps needed.
    #
    # Windows (Docker Desktop):
    #   A Linux container cannot run PowerShell on the host, so instead:
    #   1. Copies scripts/windows-bootstrap.cmd  →  %USERPROFILE%\.agentium\
    #      (bakes in the real repo path so setup.ps1 is always found)
    #   2. Copies scripts/agentium-voice-startup.cmd  →  Windows Startup folder
    #      so the bridge starts automatically on every login.
    #   The bridge runs on the next Windows login (or the user can double-click
    #   %USERPROFILE%\.agentium\bootstrap-voice.cmd to start it right away).
    # ─────────────────────────────────────────────────────────────────────────
    image: ubuntu:22.04
    container_name: agentium-voice-autoinstall
    network_mode: host
    volumes:
      - ./scripts:/scripts:ro
      - ./voice-bridge:/voice-bridge:ro
      - ${HOME:-~}/.agentium:/root/.agentium
      # Gives the container write access to the host home dir so it can
      # drop files into AppData\Roaming on Windows.
      - ${USERPROFILE:-~}:/host_home:rw
    environment:
      - HOME=/root
      - BACKEND_URL=http://127.0.0.1:8000
      - WIN_USERPROFILE=${USERPROFILE:-}
    depends_on:
      backend:
        condition: service_healthy
    command: bash /scripts/voice-autoinstall.sh
    restart: "no"
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Backend API (FastAPI) - PRIVILEGED
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.privileged
    container_name: agentium-backend
    privileged: true
    env_file:
      - ./backend/.env
    cap_add:
      - ALL
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      - DATABASE_URL=postgresql://agentium:agentium@postgres:5432/agentium
      - PYTHONPATH=/app
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=${DEBUG:-false}
      - APP_NAME=Agentium
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - HOST_ROOT_ACCESS=true
      - HOST_DOCKER_SOCKET=/var/run/docker.sock
      - HOST_FS_MOUNT=/host
      - HOST_HOME_MOUNT=/host_home
      - WHATSAPP_BRIDGE_URL=ws://whatsapp-bridge:3001
      - WHATSAPP_BRIDGE_TOKEN=${WHATSAPP_BRIDGE_TOKEN:-changeme}
      - DISPLAY=:99
      - XVFB_RESOLUTION=1920x1080x24
      - TOKENIZERS_PARALLELISM=false
      - HF_HUB_OFFLINE=1
      # ── Storage (MinIO primary / local fallback) ──────────────────────────
      # MinIO credentials — must match MINIO_ROOT_USER / MINIO_ROOT_PASSWORD above.
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-agentium-media}
      - S3_FORCE_PATH_STYLE=true
      # Local fallback path — used automatically when MinIO is unreachable.
      # Backed by the named volume below so files survive container restarts.
      - STORAGE_LOCAL_PATH=/app/data/uploads
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
    volumes:
      - ./backend:/app/backend
      - chroma_data:/app/chroma_data
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /:/host:rw
      - ${USERPROFILE:-~}:/host_home:rw
      - /sys:/sys:rw
      - /proc:/proc:rw
      - /dev:/dev:rw
      # Persistent local file storage (fallback when MinIO is unavailable)
      - uploads_data:/app/data/uploads
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      whatsapp-bridge:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agentium-network
    healthcheck:
      test: ["CMD", "python", "-c", "import http.client; conn = http.client.HTTPConnection('localhost', 8000); conn.request('GET', '/api/health'); exit(0 if conn.getresponse().status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Celery Worker - PRIVILEGED
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.privileged
    container_name: agentium-celery
    privileged: true
    cap_add:
      - ALL
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    environment:
      - DATABASE_URL=postgresql://agentium:agentium@postgres:5432/agentium
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
      - HOST_ROOT_ACCESS=true
      - HOST_DOCKER_SOCKET=/var/run/docker.sock
      - HOST_FS_MOUNT=/host
      - HOST_HOME_MOUNT=/host_home
      - WHATSAPP_BRIDGE_URL=ws://whatsapp-bridge:3001
      - WHATSAPP_BRIDGE_TOKEN=${WHATSAPP_BRIDGE_TOKEN:-changeme}
      - DISPLAY=:99
      - XVFB_RESOLUTION=1920x1080x24
      - TOKENIZERS_PARALLELISM=false
      - HF_HUB_OFFLINE=1
      # ── Storage (MinIO primary / local fallback) ──────────────────────────
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_ENDPOINT=http://minio:9000
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-agentium-media}
      - S3_FORCE_PATH_STYLE=true
      - STORAGE_LOCAL_PATH=/app/data/uploads
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:8000}
    volumes:
      - ./backend:/app/backend
      - chroma_data:/app/chroma_data
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /:/host:rw
      - ${USERPROFILE:-~}:/host_home:rw
      - /sys:/sys:rw
      - /proc:/proc:rw
      - /dev:/dev:rw
      # Same persistent uploads volume as the backend
      - uploads_data:/app/data/uploads
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: celery -A backend.main.celery worker --loglevel=info --concurrency=4
    restart: unless-stopped
    networks:
      - agentium-network

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Celery Beat - PRIVILEGED
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.privileged
    container_name: agentium-celery-beat
    privileged: true
    cap_add:
      - ALL
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    volumes:
      - ./backend:/app/backend
      - chroma_data:/app/chroma_data
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /:/host:rw
      - ${USERPROFILE:-~}:/host_home:rw
      - /sys:/sys:rw
    environment:
      - DATABASE_URL=postgresql://agentium:agentium@postgres:5432/agentium
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app
      - HOST_ROOT_ACCESS=true
      - HOST_DOCKER_SOCKET=/var/run/docker.sock
      - HOST_FS_MOUNT=/host
      - WHATSAPP_BRIDGE_URL=ws://whatsapp-bridge:3001
      - WHATSAPP_BRIDGE_TOKEN=${WHATSAPP_BRIDGE_TOKEN:-changeme}
      - DISPLAY=:99
      - XVFB_RESOLUTION=1920x1080x24
      - TOKENIZERS_PARALLELISM=false
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    command: celery -A backend.main.celery beat --loglevel=info
    restart: unless-stopped
    networks:
      - agentium-network

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Frontend (React) - Standard
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agentium-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agentium-network

volumes:
  postgres_data:
    driver: local
  chroma_data:
    driver: local
  redis_data:
    driver: local
  whatsapp_auth:
    driver: local
  # MinIO object storage — primary file store
  minio_data:
    driver: local
  # Local filesystem fallback — used when MinIO is unavailable.
  # Shared between backend and celery-worker so both can read/write uploads.
  uploads_data:
    driver: local

networks:
  agentium-network:
    driver: bridge